services:
  - type: web
    name: flytrack-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flytrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://flytrack-frontend.onrender.com"

  - type: web
    name: flytrack-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile.serve
    dockerContext: ./frontend
    healthCheckPath: /

databases:
  - name: flytrack-db
    databaseName: flytrack
    user: flytrack

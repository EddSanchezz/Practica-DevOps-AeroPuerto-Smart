version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flytrack-db
    environment:
      POSTGRES_USER: flytrack
      POSTGRES_PASSWORD: flytrack
      POSTGRES_DB: flytrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flytrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flytrack-backend
    environment:
      - DATABASE_URL=postgresql://flytrack:flytrack@postgres:5432/flytrack
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flytrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: